<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS自動投稿ツール</title>
  <style>
    :root {
      --bg: #0f0f11;
      --bg2: #18181c;
      --bg3: #222228;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #f0f0f2;
      --text2: #9898a8;
      --text3: #5a5a6a;
      --accent: #7c6dfa;
      --accent2: #5b4ed4;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --x: #e7e9ea;
      --fb: #1877F2;
      --th: #101010;
      --radius: 10px;
      --radius-lg: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      padding: 8px 12px 20px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text2);
      font-size: 13px;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(124, 109, 250, 0.15);
      color: var(--accent);
      font-weight: 500;
    }

    .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .nav-sep {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .nav-label {
      font-size: 11px;
      color: var(--text3);
      padding: 4px 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Main */
    .main {
      flex: 1;
      overflow-y: auto;
    }

    .page {
      display: none;
      padding: 28px 32px;
      max-width: 780px;
    }

    .page.active {
      display: block;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Form elements */
    .field {
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
      font-weight: 500;
    }

    textarea,
    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="password"],
    select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    select option {
      background: var(--bg3);
    }

    /* Platform toggle */
    .platform-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      font-family: inherit;
      transition: all 0.15s;
    }

    .platform-btn:hover {
      border-color: var(--border2);
      background: var(--bg3);
    }

    .platform-btn.active {
      border-color: var(--accent);
      background: rgba(124, 109, 250, 0.1);
      color: var(--text);
    }

    .p-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .p-dot-x {
      background: var(--x);
    }

    .p-dot-fb {
      background: var(--fb);
    }

    .p-dot-th {
      background: #aaa;
    }

    /* Char counter */
    .char-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .char-count {
      font-size: 12px;
      color: var(--text3);
    }

    /* Upload */
    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      cursor: pointer;
      color: var(--text3);
      font-size: 13px;
      position: relative;
      transition: all 0.15s;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      color: var(--text2);
      background: rgba(124, 109, 250, 0.04);
    }

    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .preview-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    /* Timing */
    .timing-row {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }

    .radio-opt {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
    }

    .radio-opt input {
      accent-color: var(--accent);
    }

    .datetime-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 9px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent2);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
    }

    .btn-ghost:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      font-size: 12px;
      padding: 5px 12px;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 4px;
    }

    /* Post items */
    .post-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .pi-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .pi-platforms {
      display: flex;
      gap: 5px;
    }

    .pi-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .pi-time {
      font-size: 12px;
      color: var(--text3);
    }

    .pi-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .pi-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pi-actions {
      display: flex;
      gap: 6px;
    }

    /* Status badges */
    .s-pending {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .s-posted {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .s-failed {
      background: rgba(239, 68, 68, 0.12);
      color: var(--danger);
    }

    .s-draft {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text3);
    }

    .pb-x {
      background: rgba(231, 233, 234, 0.1);
      color: #e7e9ea;
    }

    .pb-fb {
      background: rgba(24, 119, 242, 0.15);
      color: #5ca0f7;
    }

    .pb-th {
      background: rgba(255, 255, 255, 0.07);
      color: #aaa;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* Settings */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .s-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .s-card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conn-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .conn-yes {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .conn-no {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text3);
    }

    /* Search */
    .search-bar {
      position: relative;
      margin-bottom: 16px;
    }

    .search-bar input {
      padding-left: 36px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── ログイン画面オーバーレイ ── */
    .login-wrap {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 24px;
      text-align: center;
    }

    .login-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      font-family: inherit;
      text-align: center;
    }

    .login-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .login-error {
      font-size: 12px;
      color: var(--danger);
      margin-bottom: 14px;
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: var(--radius);
      display: none;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .login-error.show {
      display: block;
    }

    /* ユーザーナビメニュー */
    .user-menu {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .user-name {
      font-size: 13px;
      color: var(--text2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-btn {
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }

    .wday-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .wday-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <div class="login-title">SNS<span style="color:var(--accent)">Post</span></div>
      <div class="login-subtitle">投稿システムにログインしてください</div>

      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchLoginTab('login')">ログイン</button>
        <button class="login-tab" id="tab-register" onclick="switchLoginTab('register')">新規登録</button>
      </div>

      <div class="login-error" id="login-error"></div>

      <div id="lf-login">
        <div class="field">
          <span class="field-label">メールアドレス / ユーザー名</span>
          <input type="text" id="login-username" placeholder="name@example.com">
        </div>
        <div class="field">
          <span class="field-label">パスワード</span>
          <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:8px; height:40px;"
          onclick="doAuth()">ログイン</button>
      </div>

      <div id="lf-register" style="display:none">
        <div class="field">
          <span class="field-label">ユーザー名</span>
          <input type="text" id="reg-username" placeholder="example_user">
        </div>
        <div class="field">
          <span class="field-label">メールアドレス</span>
          <input type="text" id="reg-email" placeholder="name@example.com">
        </div>
        <div class="field">
          <span class="field-label">パスワード（6文字以上）</span>
          <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:8px; height:40px;"
          onclick="doAuth()">アカウント登録</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="logo">SNS<span>Post</span></div>
      <button class="nav-item active" onclick="showPage('compose',this)">
        <span class="nav-icon">✏️</span><span>投稿作成</span>
      </button>
      <button class="nav-item" onclick="showPage('schedule',this)">
        <span class="nav-icon">🕐</span><span>スケジュール</span>
      </button>
      <button class="nav-item" onclick="showPage('history',this)">
        <span class="nav-icon">📋</span><span>投稿履歴</span>
      </button>
      <button class="nav-item" onclick="showPage('stats',this)">
        <span class="nav-icon">📊</span><span>統計</span>
      </button>
      <div class="nav-sep"></div>
      <div class="nav-label">設定</div>
      <button class="nav-item" onclick="showPage('settings',this)">
        <span class="nav-icon">⚙️</span><span>APIキー</span>
      </button>

      <div class="user-menu">
        <div class="user-avatar" id="user-avatar">U</div>
        <span class="user-name" id="user-name-disp">ユーザー</span>
        <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </nav>

    <div class="main">
      <div class="page active" id="page-compose">
        <div class="page-title">投稿作成</div>
        <div class="card">
          <div class="field">
            <span class="field-label">投稿先</span>
            <div class="platform-row" id="platform-row">
              <button class="platform-btn active" data-p="x" onclick="togglePlatform(this)">
                <span class="p-dot p-dot-x"></span>X
              </button>
              <button class="platform-btn" data-p="facebook" onclick="togglePlatform(this)">
                <span class="p-dot p-dot-fb"></span>Facebook
              </button>
              <button class="platform-btn" data-p="threads" onclick="togglePlatform(this)">
                <span class="p-dot p-dot-th"></span>Threads
              </button>
            </div>
          </div>

          <div class="field">
            <span class="field-label">テキスト</span>
            <textarea id="post-text" placeholder="投稿内容を入力..." oninput="updateCounter()"></textarea>
            <div class="char-row">
              <span style="font-size:11px;color:var(--text3)">X: 280字 / Threads: 500字</span>
              <span class="char-count" id="char-count">0 / 280</span>
            </div>
          </div>

          <div class="field">
            <span class="field-label">画像（最大4枚）</span>
            <div class="preview-row" id="preview-row"></div>
            <div class="upload-zone">
              <input type="file" accept="image/*" multiple onchange="handleImages(this)">
              クリックまたはドラッグして画像を追加
            </div>
          </div>

          <div class="field">
            <span class="field-label">投稿タイミング</span>
            <div class="timing-row">
              <label class="radio-opt">
                <input type="radio" name="timing" value="now" checked onchange="onTimingChange()"> 今すぐ投稿
              </label>
              <label class="radio-opt">
                <input type="radio" name="timing" value="schedule" onchange="onTimingChange()"> 時刻指定
              </label>
            </div>

            <div id="dt-fields" style="display:none;" class="datetime-grid">
              <div><span class="field-label">日付</span><input type="date" id="sched-date"></div>
              <div><span class="field-label">時刻</span><input type="time" id="sched-time"></div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn btn-ghost" onclick="saveDraft()">下書き保存</button>
            <button class="btn btn-primary" onclick="submitPost()">投稿する</button>
          </div>
        </div>
      </div>

      <div class="page" id="page-schedule">
        <div class="page-title">スケジュール済み投稿</div>
        <div id="schedule-list">
          <div class="empty">スケジュールデータを受信中...</div>
        </div>
      </div>

      <div class="page" id="page-history">
        <div class="page-title">投稿履歴</div>
        <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;">
          <div class="search-bar" style="flex:1; min-width:200px">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="キーワード検索..." oninput="debounceSearch()">
          </div>
        </div>
        <div id="history-list"></div>
      </div>

      <div class="page" id="page-stats">
        <div class="page-title">投稿統計</div>
        <div class="stats-grid" id="stats-grid"></div>
      </div>

      <div class="page" id="page-settings">
        <div class="page-title">APIキー設定</div>
        <div class="settings-grid">
          <div class="s-card">
            <div class="s-card-title"><span class="p-dot p-dot-x"></span>X 設定</div>
            <button class="btn btn-primary" onclick="toast('設定保存機能')">保存</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── 認証 & 共通状態管理 ──
    let currentAuthTab = 'login';
    let token = localStorage.getItem('token') || '';
    let selectedPlatforms = ['x'];

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
    });

    // 認証状態のチェックによる画面表示制御
    function checkAuth() {
      const wrap = document.getElementById('login-wrap');
      if (token) {
        wrap.style.display = 'none';
        // ログイン完了後にAPIからデータを読み込む
        loadHistory();
        loadStats();
        loadSchedule();
      } else {
        wrap.style.display = 'flex';
      }
    }

    // 認証用タブ切り替え（ログイン / 新規登録）
    function switchLoginTab(mode) {
      currentAuthTab = mode;
      document.getElementById('login-error').classList.remove('show');

      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('lf-login');
      const formRegister = document.getElementById('lf-register');

      if (mode === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        formLogin.style.display = 'block';
        formRegister.style.display = 'none';
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        formLogin.style.display = 'none';
        formRegister.style.display = 'block';
      }
    }

    // ログイン・アカウント登録の統合実行関数
    async function doAuth() {
      const errBox = document.getElementById('login-error');
      errBox.classList.remove('show');

      if (currentAuthTab === 'login') {
        // ── ログイン認証処理 ──
        const userVal = document.getElementById('login-username').value;
        const passVal = document.getElementById('login-password').value;

        if (!userVal || !passVal) {
          showAuthError('ユーザー名とパスワードを入力してください');
          return;
        }

        // OAuth2PasswordRequestForm 規格に合わせたエンコードオブジェクトの作成
        const params = new URLSearchParams();
        params.append('username', userVal);
        params.append('password', passVal);

        try {
          const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
          });
          const data = await resp.json();

          if (!resp.ok) throw new Error(data.detail || 'ログインに失敗しました');

          token = data.access_token;
          localStorage.setItem('token', token);

          // ナビゲーション上の表示名を更新
          document.getElementById('user-name-disp').textContent = userVal;
          document.getElementById('user-avatar').textContent = userVal.charAt(0).toUpperCase();

          toast('ログインしました');
          checkAuth();
        } catch (err) {
          showAuthError(err.message);
        }

      } else {
        // ── 新規アカウント登録処理 ──
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        if (!username || !email || !password) {
          showAuthError('すべての項目を入力してください');
          return;
        }

        try {
          const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
          });
          const data = await resp.json();

          if (!resp.ok) throw new Error(data.detail || '登録に失敗しました');

          toast('アカウントを作成しました！ログインしてください。');
          switchLoginTab('login');
        } catch (err) {
          showAuthError(err.message);
        }
      }
    }

    function showAuthError(msg) {
      const errBox = document.getElementById('login-error');
      errBox.textContent = msg;
      errBox.classList.add('show');
    }

    // ログアウト処理
    function doLogout() {
      token = '';
      localStorage.removeItem('token');
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      toast('ログアウトしました');
      checkAuth();
    }

    // ── トークン自動付与型 共通 fetch 関数 (apiFetch) ──
    async function apiFetch(url, options = {}) {
      options.headers = options.headers || {};
      if (token) {
        options.headers['Authorization'] = `Bearer ${token}`;
      }
      const resp = await fetch(url, options);
      if (resp.status === 401) {
        doLogout();
      }
      return resp;
    }

    // ── 画面ナビゲーション制御 ──
    function showPage(pageId, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      document.getElementById(`page-${pageId}`).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    // プラットフォーム選択の切り替え
    function togglePlatform(btn) {
      const p = btn.getAttribute('data-p');
      if (btn.classList.contains('active')) {
        if (selectedPlatforms.length > 1) {
          btn.classList.remove('active');
          selectedPlatforms = selectedPlatforms.filter(item => item !== p);
        }
      } else {
        btn.classList.add('active');
        selectedPlatforms.push(p);
      }
      updateCounter();
    }

    function updateCounter() {
      const txt = document.getElementById('post-text').value;
      document.getElementById('char-count').textContent = `${txt.length} 文字`;
    }

    function onTimingChange() {
      const timing = document.querySelector('input[name="timing"]:checked').value;
      document.getElementById('dt-fields').style.display = (timing === 'schedule') ? 'grid' : 'none';
    }

    // ── 各種データ読み込み用 API 通信処理 ──
    async function loadHistory() {
      if (!token) return;
      try {
        const resp = await apiFetch('/api/history/');
        if (!resp.ok) return;
        const data = await resp.json();
        const list = document.getElementById('history-list');
        list.innerHTML = data.length ? '' : '<div class="empty">投稿履歴はありません</div>';

        data.forEach(item => {
          list.innerHTML += `
            <div class="post-item">
              <div class="pi-header">
                <span class="pi-badge s-posted">${item.status}</span>
                <span class="pi-time">${item.created_at || ''}</span>
              </div>
              <div class="pi-text">${item.text}</div>
            </div>`;
        });
      } catch (e) { console.error(e); }
    }

    async function loadSchedule() {
      if (!token) return;
      try {
        const resp = await apiFetch('/api/posts/');
        if (!resp.ok) return;
        const data = await resp.json();
        document.getElementById('schedule-list').innerHTML = '<div class="empty">スケジュール済み投稿はありません</div>';
      } catch (e) { console.error(e); }
    }

    async function loadStats() {
      if (!token) return;
      try {
        const resp = await apiFetch('/api/history/stats');
        if (!resp.ok) return;
        const data = await resp.json();
        const grid = document.getElementById('stats-grid');
        grid.innerHTML = `
          <div class="stat-card"><div class="stat-num">${data.total_posted || 0}</div><div class="stat-label">総投稿数</div></div>
          <div class="stat-card"><div class="stat-num">${data.drafts || 0}</div><div class="stat-label">下書き数</div></div>
        `;
      } catch (e) { console.error(e); }
    }

    // 投稿の送信
    async function submitPost() {
      const text = document.getElementById('post-text').value;
      if (!text) { alert('テキストを入力してください'); return; }

      const timing = document.querySelector('input[name="timing"]:checked').value;
      let scheduled_at = null;

      if (timing === 'schedule') {
        const d = document.getElementById('sched-date').value;
        const t = document.getElementById('sched-time').value;
        if (!d || !t) { alert('日時を正確に指定してください'); return; }
        // 安全なISO文字列へパース
        scheduled_at = new Date(`${d}T${t}`).toISOString();
      }

      try {
        const resp = await apiFetch('/api/posts/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, platforms: selectedPlatforms, scheduled_at })
        });
        if (resp.ok) {
          toast('投稿を送信・予約しました');
          document.getElementById('post-text').value = '';
          updateCounter();
          loadHistory();
        } else {
          alert('投稿に失敗しました');
        }
      } catch (e) { alert(e); }
    }

    async function saveDraft() {
      const text = document.getElementById('post-text').value;
      try {
        const resp = await apiFetch('/api/posts/draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, platforms: selectedPlatforms })
        });
        if (resp.ok) { toast('下書きを保存しました'); loadStats(); }
      } catch (e) { alert(e); }
    }

    function handleImages(input) {
      toast(`${input.files.length} 個のファイルが選択されました`);
    }

    function debounceSearch() {
      // 検索拡張用
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }
  </script>
</body>
